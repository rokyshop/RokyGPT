<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RokyGPT</title>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.min.js"></script>

  <style>
    :root {
      --bg-primary: #0f0f11;
      --bg-secondary: #111113;
      --sidebar-bg: #0a0a0c;
      --message-user: #1d4ed8;      /* bleu ChatGPT */
      --message-bot: #1e1e1f;
      --text-primary: #e5e7eb;
      --text-secondary: #9ca3af;
      --border: #1f2937;
      --accent: #3b82f6;
      --input-bg: rgba(31, 41, 55, 0.6);
      --shadow: 0 4px 30px rgba(0,0,0,0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ──────────────── SIDEBAR ──────────────── */
    #sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    #sidebar-header {
      padding: 16px;
      font-size: 1.25rem;
      font-weight: 600;
      color: white;
      border-bottom: 1px solid var(--border);
    }

    #new-chat {
      margin: 16px;
      padding: 10px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    #new-chat:hover {
      background: #2563eb;
    }

    #conversations {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .conv-item {
      padding: 12px 20px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 0.95rem;
      transition: all 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .conv-item:hover,
    .conv-item.active {
      background: rgba(59,130,246,0.1);
      color: white;
    }
    .conv-item .delete-btn {
      opacity: 0;
      color: #ef4444;
      font-size: 1rem;
    }
    .conv-item:hover .delete-btn {
      opacity: 0.8;
    }

    /* ──────────────── MAIN ──────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary);
    }

    #chat-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 500;
      font-size: 1.1rem;
      background: rgba(15,15,17,0.8);
      backdrop-filter: blur(12px);
      position: relative;
    }

    #menu-toggle {
      display: none;
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.6rem;
      cursor: pointer;
      color: var(--text-secondary);
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      max-width: 920px;
      margin: 0 auto;
      width: 100%;
    }

    .msg {
      max-width: 78%;
      padding: 14px 18px;
      border-radius: 18px;
      line-height: 1.58;
      font-size: 15.5px;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: var(--shadow);
      animation: fadeIn 0.3s ease-out;
    }

    .user {
      align-self: flex-end;
      background: var(--message-user);
      color: white;
    }

    .bot {
      align-self: flex-start;
      background: var(--message-bot);
      border: 1px solid var(--border);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    pre {
      background: #111113;
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
      margin: 12px 0;
    }

    .mermaid {
      background: #111113;
      padding: 20px;
      border-radius: 12px;
    }

    /* ──────────────── INPUT ──────────────── */
    #input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    #input-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 16px;
      resize: none;
      min-height: 24px;
      max-height: 180px;
      line-height: 1.5;
      outline: none;
    }

    #files { display: none; }
    #attach-btn {
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 1.4rem;
      padding: 8px;
    }

    #send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    #send-btn:hover {
      background: #2563eb;
    }

    .thinking {
      align-self: flex-start;
      color: var(--text-secondary);
      font-style: italic;
      padding: 14px 18px;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }

    /* Mobile */
    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
        width: 82%;
        z-index: 200;
      }
      #sidebar.open {
        transform: translateX(0);
      }
      #chat-header {
        padding-left: 60px;
      }
      #menu-toggle {
        display: block;
      }
      #chat {
        padding: 20px 16px;
      }
    }
  </style>
</head>
<body>

  <aside id="sidebar">
    <div id="sidebar-header">RokyGPT</div>
    <button id="new-chat">+ Nouveau chat</button>
    <div id="conversations"></div>
  </aside>

  <main id="main">
    <div id="chat-header">
      <div id="menu-toggle">☰</div>
      <span id="current-title">RokyGPT</span>
    </div>

    <div id="chat"></div>

    <div id="input-area">
      <div id="input-wrapper">
        <label for="files" id="attach-btn">📎</label>
        <input type="file" id="files" multiple />
        <textarea id="input" rows="1" placeholder="Envoyer un message..."></textarea>
        <button id="send-btn">➜</button>
      </div>
    </div>
  </main>

  <script>
    mermaid.initialize({ startOnLoad: true, theme: 'dark' });

    let currentConvId = localStorage.getItem('currentConvId') || Date.now().toString();
    let conversations = JSON.parse(localStorage.getItem('rokyConversations') || '{}');
    let hasSyncedThisConv = false;

    if (!conversations[currentConvId]) {
      conversations[currentConvId] = { id: currentConvId, title: "Nouvelle conversation", messages: [] };
    }

    function saveConversations() {
      localStorage.setItem('rokyConversations', JSON.stringify(conversations));
      localStorage.setItem('currentConvId', currentConvId);
    }

    function renderConversations() {
      const container = document.getElementById("conversations");
      container.innerHTML = "";
      Object.values(conversations).forEach(conv => {
        const item = document.createElement("div");
        item.className = `conv-item ${conv.id === currentConvId ? 'active' : ''}`;
        item.innerHTML = `
          <span>${conv.title}</span>
          <span class="delete-btn" onclick="deleteConv('${conv.id}'); event.stopPropagation();">✕</span>
        `;
        item.onclick = () => loadConversation(conv.id);
        container.appendChild(item);
      });
    }

    function loadConversation(id) {
      currentConvId = id;
      hasSyncedThisConv = false;
      saveConversations();
      renderConversations();

      const conv = conversations[id];
      document.getElementById("current-title").textContent = conv.title;

      const chat = document.getElementById("chat");
      chat.innerHTML = "";

      conv.messages.forEach(msg => {
        renderMessageToUI(msg.content, msg.role === "user" ? "user" : "bot", msg.files || []);
      });

      if (conv.messages.length === 0) {
        renderMessageToUI("Salut ! Je suis RokyGPT, comment puis-je t’aider ?", "bot");
      }
    }

    async function syncOnceIfNeeded() {
      if (hasSyncedThisConv || !conversations[currentConvId]?.messages?.length) return;

      try {
        const res = await fetch("/restore", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            userId: currentConvId,
            messages: conversations[currentConvId].messages.map(m => ({ role: m.role, content: m.content }))
          })
        });
        if (res.ok) hasSyncedThisConv = true;
      } catch (err) {
        console.error("Erreur sync :", err);
      }
    }

    function createNewConversation() {
      const id = Date.now().toString();
      conversations[id] = { id, title: "Nouvelle conversation", messages: [] };
      currentConvId = id;
      hasSyncedThisConv = false;
      saveConversations();
      renderConversations();
      loadConversation(id);
    }

    function deleteConv(id) {
      if (Object.keys(conversations).length <= 1) {
        alert("Impossible de supprimer la dernière conversation.");
        return;
      }
      if (confirm("Supprimer cette conversation ?")) {
        delete conversations[id];
        if (currentConvId === id) {
          const ids = Object.keys(conversations);
          currentConvId = ids[ids.length - 1];
        }
        saveConversations();
        renderConversations();
        loadConversation(currentConvId);
      }
    }

    function updateTitleIfNeeded(text) {
      const conv = conversations[currentConvId];
      if (conv.title === "Nouvelle conversation" && text.trim()) {
        const firstWords = text.trim().split(/\s+/).slice(0, 6).join(" ").replace(/[^\w\s]/gi, '');
        conv.title = firstWords || "Conversation";
        saveConversations();
        renderConversations();
        document.getElementById("current-title").textContent = conv.title;
      }
    }

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const filesInput = document.getElementById("files");

    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 180) + "px";
    });

    async function send() {
      const msg = input.value.trim();
      if (!msg && filesInput.files.length === 0) return;

      await syncOnceIfNeeded();

      const files = Array.from(filesInput.files);
      addMessage(msg, "user", files);
      updateTitleIfNeeded(msg);

      const thinking = document.createElement("div");
      thinking.className = "thinking";
      thinking.innerHTML = "RokyGPT réfléchit<span>.</span><span>.</span><span>.</span>";
      chat.appendChild(thinking);
      chat.scrollTop = chat.scrollHeight;

      const formData = new FormData();
      formData.append("message", msg);
      formData.append("userId", currentConvId);
      files.forEach(f => formData.append("files", f));

      input.value = "";
      input.style.height = "24px";
      filesInput.value = "";

      try {
        const res = await fetch("/chat", { method: "POST", body: formData });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();

        chat.removeChild(thinking);
        addMessage(data.reply || "Pas de réponse...", "bot");
      } catch (err) {
        console.error(err);
        if (thinking.parentNode) chat.removeChild(thinking);
        addMessage("Erreur – réessaie dans quelques secondes", "bot");
      }
    }

    function renderMessageToUI(text, type, files = []) {
      const div = document.createElement("div");
      div.className = `msg ${type}`;

      let rendered = text;
      try {
        if (text.includes("```mermaid")) {
          const code = text.split("```mermaid")[1]?.split("```")[0] || "";
          rendered = `<div class="mermaid">${code.trim()}</div>`;
          setTimeout(() => mermaid.init(), 150);
        } else {
          rendered = marked.parse(text);
        }
      } catch (e) {
        rendered = text;
      }

      div.innerHTML = rendered;

      div.querySelectorAll("pre code").forEach(el => {
        try { Prism.highlightElement(el); } catch {}
      });

      if (files.length > 0 && type === "user") {
        const fileDiv = document.createElement("div");
        fileDiv.style.marginTop = "10px";
        fileDiv.style.fontSize = "0.9rem";
        fileDiv.style.color = "var(--text-secondary)";
        fileDiv.innerHTML = files.map(f => `📎 ${f.name}`).join(" • ");
        div.appendChild(fileDiv);
      }

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addMessage(text, type, files = []) {
      renderMessageToUI(text, type, files);

      conversations[currentConvId].messages.push({
        role: type === "user" ? "user" : "assistant",
        content: text,
        files: files.map(f => ({ name: f.name }))
      });
      saveConversations();
    }

    // Events
    document.getElementById("send-btn").onclick = send;
    input.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    document.getElementById("new-chat").onclick = createNewConversation;

    document.getElementById("menu-toggle").onclick = () => {
      document.getElementById("sidebar").classList.toggle("open");
    };

    // Init
    renderConversations();
    loadConversation(currentConvId);
  </script>
</body>
</html>
