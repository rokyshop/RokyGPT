<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RokyGPT</title>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.min.js"></script>

  <style>
    :root {
      --bg: #0f0f11;
      --sidebar: #202123;
      --chat-bg: #0f0f11;
      --msg-user: #1a7bff;
      --msg-bot: #2d2d2f;
      --text: #ececf1;
      --text-muted: #acacbe;
      --border: #343541;
      --accent: #10a37f;
      --input-bg: #40414f;
      --input-border: #565869;
      --shadow: 0 4px 30px rgba(0,0,0,0.5);
    }

    body.light {
      --bg: #f4f4f9;
      --sidebar: #ffffff;
      --chat-bg: #ffffff;
      --msg-user: #0066ff;
      --msg-bot: #f0f0f5;
      --text: #333;
      --text-muted: #666;
      --border: #e0e0e5;
      --input-bg: #f9f9fc;
      --input-border: #d0d0d8;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* SIDEBAR */
    #sidebar {
      width: 260px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    #sidebar-header {
      padding: 16px;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }

    #new-chat {
      margin: 16px;
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
    }

    #conversations {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .conv-item {
      padding: 12px 20px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.95rem;
      border-radius: 6px;
      margin: 0 8px;
      transition: all 0.15s;
    }
    .conv-item:hover, .conv-item.active {
      background: rgba(255,255,255,0.08);
      color: white;
    }

    /* MAIN */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--chat-bg);
    }

    #chat-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(15,15,17,0.9);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 10;
    }

    #profile-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 8px;
    }

    #menu-toggle { display: none; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }

    .msg {
      max-width: 75%;
      padding: 16px 20px;
      border-radius: 20px;
      line-height: 1.6;
      font-size: 16px;
      animation: fadeIn 0.4s;
      position: relative;
    }

    .user { align-self: flex-end; background: var(--msg-user); color: white; }
    .bot  { align-self: flex-start; background: var(--msg-bot); border: 1px solid var(--border); }

    @keyframes fadeIn { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }

    /* BOUTONS ACTIONS SUR MESSAGES */
    .msg-actions {
      position: absolute;
      top: 8px;
      right: 12px;
      display: flex;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .msg:hover .msg-actions { opacity: 0.8; }

    .action-btn {
      background: rgba(0,0,0,0.4);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .action-btn:hover { background: rgba(0,0,0,0.7); }

    /* INPUT */
    #input-area {
      padding: 20px 24px;
      background: var(--chat-bg);
      border-top: 1px solid var(--border);
    }

    #input-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 24px;
      padding: 12px 20px;
      backdrop-filter: blur(10px);
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 16px;
      resize: none;
      min-height: 24px;
      max-height: 160px;
      outline: none;
    }

    .input-icon {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.4rem;
      padding: 8px;
    }

    /* MODALS (settings + login) */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--sidebar);
      border-radius: 12px;
      width: 90%;
      max-width: 420px;
      padding: 24px;
      color: var(--text);
    }

    .setting-item { margin: 16px 0; display: flex; justify-content: space-between; align-items: center; }

    /* TOAST (feedback copie) */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
      #sidebar { transform: translateX(-100%); position: fixed; height: 100%; z-index: 200; }
      #sidebar.open { transform: translateX(0); }
      #menu-toggle { display: block; }
      #chat-header { padding-left: 60px; }
      #chat { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div id="sidebar-header">RokyGPT</div>
    <button id="new-chat">+ Nouveau chat</button>
    <div id="conversations"></div>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <div id="chat-header">
      <div id="menu-toggle">☰</div>
      <span id="current-title">RokyGPT</span>
      <button id="profile-btn" onclick="openSettings()">👤</button>
    </div>

    <div id="chat"></div>

    <div id="input-area">
      <div id="input-wrapper">
        <label for="files" class="input-icon">📎</label>
        <input type="file" id="files" multiple />
        <textarea id="input" rows="1" placeholder="Envoyer un message à RokyGPT..."></textarea>
        <span class="input-icon">🎤</span>
        <button id="send-btn">➜</button>
      </div>
    </div>
  </main>

  <!-- TOAST FEEDBACK -->
  <div id="toast">Copié !</div>

  <!-- SETTINGS MODAL -->
  <div id="settings-modal" class="modal">
    <div class="modal-content">
      <h2>Paramètres</h2>
      <div class="setting-item">
        <span>Mode sombre</span>
        <input type="checkbox" id="dark-mode-toggle" checked onchange="toggleTheme()">
      </div>
      <div class="setting-item">
        <span>Effacer toutes les conversations</span>
        <button onclick="clearAllConversations()">Effacer</button>
      </div>
      <div class="setting-item">
        <span>Utilisateur :</span>
        <span id="current-user-display">Non connecté</span>
      </div>
      <hr style="margin:20px 0; border-color:var(--border);">
      <h3>Abonnement</h3>
      <p>Version gratuite : limites quotidiennes</p>
      <button onclick="goToSubscription()" style="background:var(--accent); color:white; padding:12px; border:none; border-radius:8px; cursor:pointer; width:100%; margin-top:12px; font-weight:bold;">
        Passer à Premium (5€/mois)
      </button>
      <button onclick="closeSettings()" style="margin-top:16px; width:100%; padding:12px; background:none; border:1px solid var(--border); border-radius:8px; color:var(--text); cursor:pointer;">
        Fermer
      </button>
    </div>
  </div>

  <!-- LOGIN MODAL -->
  <div id="login-modal" class="modal" style="display:flex;">
    <div class="modal-content" style="max-width:380px;">
      <h2>Connexion à RokyGPT</h2>
      <input id="login-username" placeholder="Nom d'utilisateur" style="width:100%; padding:12px; margin:12px 0; border-radius:8px; border:1px solid var(--border); background:var(--input-bg); color:var(--text);">
      <input id="login-password" type="password" placeholder="Mot de passe" style="width:100%; padding:12px; margin:12px 0; border-radius:8px; border:1px solid var(--border); background:var(--input-bg); color:var(--text);">
      <button onclick="login()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer; margin-top:12px;">Se connecter</button>
      <p style="margin-top:16px; text-align:center;">
        Pas de compte ? <a href="#" onclick="alert('Inscription pas encore disponible – utilise un pseudo pour tester !')">Créer un compte</a>
      </p>
      <button onclick="closeLogin()" style="margin-top:16px; width:100%; padding:12px; background:none; border:1px solid var(--border); border-radius:8px; color:var(--text-muted); cursor:pointer;">
        Continuer sans connexion
      </button>
    </div>
  </div>

  <script>
    // ─── THÈME ───
    function toggleTheme() {
      document.body.classList.toggle('light');
      localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    }
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');

    // ─── LOGIN ───
    let currentUser = localStorage.getItem('user') || null;
    document.getElementById('current-user-display').textContent = currentUser || "Non connecté";

    function login() {
      const username = document.getElementById('login-username').value.trim();
      if (username) {
        localStorage.setItem('user', username);
        localStorage.setItem('token', 'fake-jwt-' + Date.now());
        currentUser = username;
        document.getElementById('current-user-display').textContent = username;
        document.getElementById('login-modal').style.display = 'none';
        alert('Connecté en tant que ' + username);
      } else {
        alert('Entre un nom d’utilisateur !');
      }
    }

    function closeLogin() {
      document.getElementById('login-modal').style.display = 'none';
    }

    // ─── SETTINGS ───
    function openSettings() {
      document.getElementById('settings-modal').style.display = 'flex';
    }
    function closeSettings() {
      document.getElementById('settings-modal').style.display = 'none';
    }

    function clearAllConversations() {
      if (confirm('Effacer TOUTES les conversations ?')) {
        localStorage.removeItem('rokyConversations');
        localStorage.removeItem('currentConvId');
        location.reload();
      }
    }

    function goToSubscription() {
      alert('Abonnement Premium : 5€/mois\n\n- Réponses illimitées\n- Priorité sur Mistral\n- Mode voix bientôt\n\n(Paiement Stripe à implémenter)');
    }

    document.getElementById('profile-btn').onclick = openSettings;

    // ─── TOAST ───
    function showToast(message = "Copié !") {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }

    // ─── ACTIONS MESSAGES ───
    function copyMessage(text) {
      navigator.clipboard.writeText(text).then(() => {
        showToast("Copié dans le presse-papiers !");
      }).catch(err => {
        showToast("Erreur lors de la copie");
        console.error(err);
      });
    }

    async function regenerateMessage(msgIndex) {
      const conv = conversations[currentConvId];
      if (!conv || msgIndex < 0 || msgIndex >= conv.messages.length) return;

      // On prend le dernier message utilisateur avant celui-ci (ou le tout dernier user)
      let lastUserMsg = null;
      for (let i = msgIndex - 1; i >= 0; i--) {
        if (conv.messages[i].role === "user") {
          lastUserMsg = conv.messages[i].content;
          break;
        }
      }
      if (!lastUserMsg) {
        showToast("Aucun message utilisateur à régénérer");
        return;
      }

      // On supprime la réponse actuelle et celles après (si plusieurs régénérations)
      conv.messages.splice(msgIndex);

      // On ajoute le thinking
      const thinking = document.createElement("div");
      thinking.className = "thinking";
      thinking.innerHTML = "RokyGPT réfléchit<span>.</span><span>.</span><span>.</span>";
      chat.appendChild(thinking);
      chat.scrollTop = chat.scrollHeight;

      // On resync (au cas où)
      await syncOnceIfNeeded();

      // On envoie à nouveau le dernier user message
      const formData = new FormData();
      formData.append("message", lastUserMsg);
      formData.append("userId", currentConvId);

      try {
        const res = await fetch("/chat", { method: "POST", body: formData });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();

        chat.removeChild(thinking);
        addMessage(data.reply || "Pas de réponse...", "bot");
      } catch (err) {
        console.error(err);
        if (thinking.parentNode) chat.removeChild(thinking);
        addMessage("Erreur lors de la régénération", "bot");
      }
    }

    // ─── LE RESTE DU SCRIPT ───
    mermaid.initialize({ startOnLoad: true, theme: 'dark' });

    let currentConvId = localStorage.getItem('currentConvId') || Date.now().toString();
    let conversations = JSON.parse(localStorage.getItem('rokyConversations') || '{}');
    let hasSyncedThisConv = false;

    if (!conversations[currentConvId]) {
      conversations[currentConvId] = { id: currentConvId, title: "Nouvelle conversation", messages: [] };
    }

    function saveConversations() {
      localStorage.setItem('rokyConversations', JSON.stringify(conversations));
      localStorage.setItem('currentConvId', currentConvId);
    }

    function renderConversations() {
      const container = document.getElementById("conversations");
      container.innerHTML = "";
      Object.values(conversations).forEach(conv => {
        const item = document.createElement("div");
        item.className = `conv-item ${conv.id === currentConvId ? 'active' : ''}`;
        item.innerHTML = `
          <span>${conv.title}</span>
          <span class="delete-btn" onclick="deleteConv('${conv.id}'); event.stopPropagation();">✕</span>
        `;
        item.onclick = () => loadConversation(conv.id);
        container.appendChild(item);
      });
    }

    function loadConversation(id) {
      currentConvId = id;
      hasSyncedThisConv = false;
      saveConversations();
      renderConversations();

      const conv = conversations[id];
      document.getElementById("current-title").textContent = conv.title || "RokyGPT";

      const chat = document.getElementById("chat");
      chat.innerHTML = "";

      conv.messages.forEach((msg, index) => {
        renderMessageToUI(msg.content, msg.role === "user" ? "user" : "bot", msg.files || [], index);
      });

      if (conv.messages.length === 0) {
        renderMessageToUI("Salut ! Je suis RokyGPT, comment puis-je t’aider ?", "bot", [], -1);
      }
    }

    async function syncOnceIfNeeded() {
      if (hasSyncedThisConv || !conversations[currentConvId]?.messages?.length) return;

      try {
        const res = await fetch("/restore", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            userId: currentConvId,
            messages: conversations[currentConvId].messages.map(m => ({ role: m.role, content: m.content }))
          })
        });
        if (res.ok) hasSyncedThisConv = true;
      } catch (err) {
        console.error("Erreur sync :", err);
      }
    }

    function createNewConversation() {
      const id = Date.now().toString();
      conversations[id] = { id, title: "Nouvelle conversation", messages: [] };
      currentConvId = id;
      hasSyncedThisConv = false;
      saveConversations();
      renderConversations();
      loadConversation(id);
    }

    function deleteConv(id) {
      if (Object.keys(conversations).length <= 1) {
        alert("Impossible de supprimer la dernière conversation.");
        return;
      }
      if (confirm("Supprimer cette conversation ?")) {
        delete conversations[id];
        if (currentConvId === id) {
          const ids = Object.keys(conversations);
          currentConvId = ids[ids.length - 1];
        }
        saveConversations();
        renderConversations();
        loadConversation(currentConvId);
      }
    }

    function updateTitleIfNeeded(text) {
      const conv = conversations[currentConvId];
      if (conv.title === "Nouvelle conversation" && text.trim()) {
        const firstWords = text.trim().split(/\s+/).slice(0, 6).join(" ").replace(/[^\w\s]/gi, '');
        conv.title = firstWords || "Conversation";
        saveConversations();
        renderConversations();
        document.getElementById("current-title").textContent = conv.title;
      }
    }

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const filesInput = document.getElementById("files");

    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 180) + "px";
    });

    async function send() {
      const msg = input.value.trim();
      if (!msg && filesInput.files.length === 0) return;

      await syncOnceIfNeeded();

      const files = Array.from(filesInput.files);
      addMessage(msg, "user", files);
      updateTitleIfNeeded(msg);

      const thinking = document.createElement("div");
      thinking.className = "thinking";
      thinking.innerHTML = "RokyGPT réfléchit<span>.</span><span>.</span><span>.</span>";
      chat.appendChild(thinking);
      chat.scrollTop = chat.scrollHeight;

      const formData = new FormData();
      formData.append("message", msg);
      formData.append("userId", currentConvId);
      files.forEach(f => formData.append("files", f));

      input.value = "";
      input.style.height = "24px";
      filesInput.value = "";

      try {
        const res = await fetch("/chat", { method: "POST", body: formData });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();

        chat.removeChild(thinking);
        addMessage(data.reply || "Pas de réponse...", "bot");
      } catch (err) {
        console.error(err);
        if (thinking.parentNode) chat.removeChild(thinking);
        addMessage("Erreur – réessaie dans quelques secondes", "bot");
      }
    }

    function renderMessageToUI(text, type, files = [], index = -1) {
      const div = document.createElement("div");
      div.className = `msg ${type}`;

      let rendered = text;
      try {
        if (text.includes("```mermaid")) {
          const code = text.split("```mermaid")[1]?.split("```")[0] || "";
          rendered = `<div class="mermaid">${code.trim()}</div>`;
          setTimeout(() => mermaid.init(), 150);
        } else {
          rendered = marked.parse(text);
        }
      } catch (e) {
        rendered = text;
      }

      div.innerHTML = rendered;

      div.querySelectorAll("pre code").forEach(el => {
        try { Prism.highlightElement(el); } catch {}
      });

      if (files.length > 0 && type === "user") {
        const fileDiv = document.createElement("div");
        fileDiv.style.marginTop = "10px";
        fileDiv.style.fontSize = "0.9rem";
        fileDiv.style.color = "var(--text-muted)";
        fileDiv.innerHTML = files.map(f => `📎 ${f.name}`).join(" • ");
        div.appendChild(fileDiv);
      }

      // Ajout des boutons d'action (copier + régénérer)
      const actions = document.createElement("div");
      actions.className = "msg-actions";

      const copyBtn = document.createElement("button");
      copyBtn.className = "action-btn";
      copyBtn.textContent = "Copier";
      copyBtn.onclick = () => copyMessage(text);
      actions.appendChild(copyBtn);

      if (type === "bot" && index >= 0) {
        const regenBtn = document.createElement("button");
        regenBtn.className = "action-btn";
        regenBtn.textContent = "Régénérer";
        regenBtn.onclick = () => regenerateMessage(index);
        actions.appendChild(regenBtn);
      }

      div.appendChild(actions);

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addMessage(text, type, files = []) {
      // On ajoute avec index = longueur actuelle (avant push)
      const index = conversations[currentConvId].messages.length;
      renderMessageToUI(text, type, files, index);

      conversations[currentConvId].messages.push({
        role: type === "user" ? "user" : "assistant",
        content: text,
        files: files.map(f => ({ name: f.name }))
      });
      saveConversations();
    }

    // Events
    document.getElementById("send-btn").onclick = send;
    input.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    document.getElementById("new-chat").onclick = createNewConversation;

    document.getElementById("menu-toggle").onclick = () => {
      document.getElementById("sidebar").classList.toggle("open");
    };

    // Init
    renderConversations();
    loadConversation(currentConvId);
  </script>
</body>
</html>
