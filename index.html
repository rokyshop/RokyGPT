<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RokyGPT Pro</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css">
<script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
<style>
  body { background: #0f111a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; padding:0; display:flex; flex-direction:column; height:100vh;}
  #chat { flex:1; overflow-y:auto; padding:20px; max-width:900px; margin:auto; display:flex; flex-direction:column; gap:10px;}
  .msg { padding:12px 16px; border-radius:12px; word-wrap:break-word; max-width:70%; line-height:1.4; font-size:15px; white-space:pre-wrap; }
  .user { background:#1e1e2a; align-self:flex-end; text-align:right;}
  .bot { background:#2a2a3a; align-self:flex-start; text-align:left;}
  textarea { width:calc(100% - 24px); margin:10px auto; padding:12px; border-radius:8px; border:none; resize:none; font-size:15px; background:#1c1c29; color:white;}
  button { width:calc(100% - 24px); margin:0 auto 10px auto; padding:12px; border-radius:8px; border:none; background:#4f46e5; color:white; font-weight:bold; cursor:pointer; font-size:15px;}
  pre { background:#1c1c29; padding:10px; border-radius:8px; overflow-x:auto;}
  code { font-family:'Courier New', Courier, monospace; background:#1c1c29; padding:2px 4px; border-radius:4px;}
  .mermaid { background:#1c1c29; padding:10px; border-radius:8px; overflow-x:auto;}
  .file-msg { margin-top:5px; font-size:14px; color:#bbb;}
  .msg img { max-width:100%; border-radius:8px; margin-top:5px;}
</style>
</head>
<body>

<div id="chat"></div>
<textarea id="input" rows="2" placeholder="Tape ton message ici..."></textarea>
<input type="file" id="files" multiple style="margin:auto;">
<button onclick="send()">Envoyer</button>

<script>
mermaid.initialize({ startOnLoad:true });
const userId = "user-" + Math.random();

async function send() {
  const input = document.getElementById("input");
  const filesInput = document.getElementById("files");
  const msg = input.value.trim();
  if (!msg && filesInput.files.length === 0) return;

  addMessage(msg, "user", filesInput.files);
  input.value = "";

  const formData = new FormData();
  formData.append("message", msg);
  formData.append("userId", userId);
  for (const f of filesInput.files) formData.append("files", f);

  try {
    const res = await fetch("/chat", { method: "POST", body: formData });
    const data = await res.json();
    addMessage(data.reply, "bot");
  } catch (err) {
    addMessage("Erreur serveur", "bot");
    console.error(err);
  }

  filesInput.value = "";
}

function addMessage(text, type, files=[]) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + type;

  if (!text) text = "";

  // Gestion Mermaid
  if (text.includes("```mermaid")) {
    const code = text.split("```mermaid")[1].split("```")[0];
    div.innerHTML = `<div class="mermaid">${code}</div>`;
    setTimeout(() => mermaid.init(), 100);
  } else {
    div.innerHTML = marked.parse(text);
    div.querySelectorAll("pre code").forEach(el => Prism.highlightElement(el));
  }

  if (files.length > 0) {
    const fileDiv = document.createElement("div");
    fileDiv.className = "file-msg";
    fileDiv.innerHTML = Array.from(files).map(f => `📎 ${f.name}`).join("<br>");
    div.appendChild(fileDiv);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
