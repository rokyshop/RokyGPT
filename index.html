<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RokyGPT Pro</title>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.min.js"></script>

  <style>
    :root {
      --bg: #0a0a0f;
      --sidebar-bg: #101015;
      --chat-bg: #0c0c12;
      --msg-user: #1a2b44;
      --msg-bot: #17171f;
      --accent: #5a7cff;
      --text: #d4d4e0;
      --text-light: #8a8aa3;
      --border: #1f1f2a;
      --hover: #1e1e2e;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }
    #sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
      z-index: 100;
    }
    #sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 1.2rem;
      color: var(--text);
    }
    #new-chat {
      margin: 16px 16px 8px;
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
    }
    #new-chat:hover { opacity: 0.9; }
    #conversations {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .conv-item {
      padding: 12px 16px;
      cursor: pointer;
      color: var(--text-light);
      border-radius: 8px;
      margin: 4px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.15s;
    }
    .conv-item:hover { background: var(--hover); color: var(--text); }
    .conv-item.active {
      background: rgba(90,124,255,0.15);
      color: white;
      font-weight: 500;
    }
    .conv-item .delete-btn {
      opacity: 0;
      color: #ff6b6b;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .conv-item:hover .delete-btn { opacity: 0.7; }
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--chat-bg);
    }
    #chat-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 500;
      background: rgba(12,12,18,0.7);
      backdrop-filter: blur(10px);
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }
    .msg {
      max-width: 82%;
      padding: 13px 18px;
      border-radius: 14px;
      line-height: 1.55;
      font-size: 15.2px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user { align-self: flex-end; background: var(--msg-user); color: #e0e7ff; }
    .bot { align-self: flex-start; background: var(--msg-bot); border: 1px solid var(--border); }
    .msg img { max-width: 100%; border-radius: 12px; margin-top: 10px; }
    pre { background:#14141e; padding:16px; border-radius:12px; overflow-x:auto; margin:12px 0; }
    code { font-family: 'Consolas', monospace; }
    .mermaid { background:#14141e; padding:18px; border-radius:12px; }
    #input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--chat-bg);
    }
    #input-wrapper {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #14141e;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 18px;
    }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 16px;
      resize: none;
      min-height: 24px;
      max-height: 180px;
      line-height: 1.45;
      outline: none;
    }
    #files { display: none; }
    #attach-btn {
      cursor: pointer;
      color: var(--text-light);
      font-size: 1.4rem;
    }
    #send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
    }
    #send-btn:hover { background: #4a68e0; }
    .thinking {
      align-self: flex-start;
      color: var(--text-light);
      font-style: italic;
      padding: 12px 18px;
    }
    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
        width: 80%;
      }
      #sidebar.open { transform: translateX(0); }
      #chat-header { padding-left: 60px; position: relative; }
      #menu-toggle {
        display: block;
        position: absolute;
        left: 16px; top: 50%;
        transform: translateY(-50%);
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--text-light);
      }
    }
    #menu-toggle { display: none; }
  </style>
</head>
<body>

  <aside id="sidebar">
    <div id="sidebar-header">RokyGPT</div>
    <button id="new-chat">+ Nouveau chat</button>
    <div id="conversations"></div>
  </aside>

  <main id="main">
    <div id="chat-header">
      <div id="menu-toggle">☰</div>
      <span id="current-title">RokyGPT – Nouvelle conversation</span>
    </div>

    <div id="chat"></div>

    <div id="input-area">
      <div id="input-wrapper">
        <label for="files" id="attach-btn">📎</label>
        <input type="file" id="files" multiple />
        <textarea id="input" rows="1" placeholder="Message à RokyGPT..."></textarea>
        <button id="send-btn">→</button>
      </div>
    </div>
  </main>

  <script>
    mermaid.initialize({ startOnLoad: true, theme: 'dark' });

    // ─── Gestion multi-conversations ───
    let currentConvId = localStorage.getItem('currentConvId') || Date.now().toString();
    let conversations = JSON.parse(localStorage.getItem('rokyConversations') || '{}');

    if (!conversations[currentConvId]) {
      conversations[currentConvId] = {
        id: currentConvId,
        title: "Nouvelle conversation",
        messages: []
      };
    }

    function saveConversations() {
      localStorage.setItem('rokyConversations', JSON.stringify(conversations));
      localStorage.setItem('currentConvId', currentConvId);
    }

    function renderConversations() {
      const container = document.getElementById("conversations");
      container.innerHTML = "";
      Object.values(conversations).forEach(conv => {
        const item = document.createElement("div");
        item.className = `conv-item ${conv.id === currentConvId ? 'active' : ''}`;
        item.innerHTML = `
          <span>${conv.title}</span>
          <span class="delete-btn" onclick="deleteConv('${conv.id}'); event.stopPropagation();">✕</span>
        `;
        item.onclick = () => loadConversation(conv.id);
        container.appendChild(item);
      });
    }

    function loadConversation(id) {
      currentConvId = id;
      saveConversations();
      renderConversations();

      const conv = conversations[id];
      document.getElementById("current-title").textContent = conv.title;

      const chat = document.getElementById("chat");
      chat.innerHTML = "";

      conv.messages.forEach(msg => {
        addMessage(msg.content, msg.role === "user" ? "user" : "bot", msg.files || []);
      });

      if (conv.messages.length === 0) {
        addMessage("Salut ! Je suis RokyGPT. En quoi puis-je t'aider aujourd'hui ?", "bot");
      }

      // Resynchronisation du contexte vers le serveur
      resyncConversationToServer();
    }

    async function resyncConversationToServer() {
      const conv = conversations[currentConvId];
      if (!conv || conv.messages.length === 0) return;

      try {
        const res = await fetch("/restore", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            userId: currentConvId,
            messages: conv.messages.map(m => ({ role: m.role, content: m.content }))
          })
        });

        if (res.ok) {
          console.log("Contexte restauré avec succès");
        } else {
          console.warn("Échec de la restauration du contexte");
        }
      } catch (err) {
        console.error("Erreur lors de la resync :", err);
      }
    }

    function createNewConversation() {
      const id = Date.now().toString();
      conversations[id] = {
        id,
        title: "Nouvelle conversation",
        messages: []
      };
      currentConvId = id;
      saveConversations();
      renderConversations();
      loadConversation(id);
    }

    function deleteConv(id) {
      if (Object.keys(conversations).length <= 1) {
        alert("Tu ne peux pas supprimer la dernière conversation !");
        return;
      }
      if (confirm("Supprimer cette conversation ?")) {
        delete conversations[id];
        if (currentConvId === id) {
          const ids = Object.keys(conversations);
          currentConvId = ids[ids.length - 1];
        }
        saveConversations();
        renderConversations();
        loadConversation(currentConvId);
      }
    }

    function updateTitleIfNeeded(text) {
      const conv = conversations[currentConvId];
      if (conv.title === "Nouvelle conversation" && text.trim()) {
        const firstWords = text.trim().split(/\s+/).slice(0, 5).join(" ").replace(/[^\w\s]/gi, '');
        conv.title = firstWords || "Conversation sans titre";
        saveConversations();
        renderConversations();
        document.getElementById("current-title").textContent = conv.title;
      }
    }

    // ─── Chat logic ───
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const filesInput = document.getElementById("files");

    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 180) + "px";
    });

    async function send() {
      const msg = input.value.trim();
      if (!msg && filesInput.files.length === 0) return;

      const files = Array.from(filesInput.files);
      addMessage(msg, "user", files);
      updateTitleIfNeeded(msg);

      const thinking = document.createElement("div");
      thinking.className = "thinking";
      thinking.textContent = "RokyGPT réfléchit...";
      chat.appendChild(thinking);
      chat.scrollTop = chat.scrollHeight;

      const formData = new FormData();
      formData.append("message", msg);
      formData.append("userId", currentConvId);
      files.forEach(f => formData.append("files", f));

      input.value = "";
      input.style.height = "24px";
      filesInput.value = "";

      try {
        const res = await fetch("/chat", { method: "POST", body: formData });
        if (!res.ok) throw new Error("Erreur HTTP " + res.status);
        const data = await res.json();

        chat.removeChild(thinking);
        addMessage(data.reply || "Pas de réponse...", "bot");
      } catch (err) {
        console.error(err);
        if (thinking.parentNode) chat.removeChild(thinking);
        addMessage("Erreur – réessaie dans quelques secondes", "bot");
      }
    }

    function addMessage(text, type, files = []) {
      const div = document.createElement("div");
      div.className = `msg ${type}`;

      let rendered = text;
      try {
        if (text.includes("```mermaid")) {
          const code = text.split("```mermaid")[1]?.split("```")[0] || "";
          rendered = `<div class="mermaid">${code.trim()}</div>`;
          setTimeout(() => mermaid.init(), 150);
        } else {
          rendered = marked.parse(text);
        }
      } catch (e) {
        console.warn("Erreur markdown:", e);
        rendered = text;
      }

      div.innerHTML = rendered;

      div.querySelectorAll("pre code").forEach(el => {
        try { Prism.highlightElement(el); } catch {}
      });

      if (files.length > 0 && type === "user") {
        const fileDiv = document.createElement("div");
        fileDiv.style.marginTop = "10px";
        fileDiv.style.fontSize = "0.92rem";
        fileDiv.style.color = "var(--text-light)";
        fileDiv.innerHTML = files.map(f => `📎 ${f.name}`).join(" • ");
        div.appendChild(fileDiv);
      }

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;

      conversations[currentConvId].messages.push({
        role: type === "user" ? "user" : "assistant",
        content: text,
        files: files.map(f => ({ name: f.name }))
      });
      saveConversations();
    }

    // Events
    document.getElementById("send-btn").onclick = send;
    input.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    document.getElementById("new-chat").onclick = createNewConversation;

    document.getElementById("menu-toggle").onclick = () => {
      document.getElementById("sidebar").classList.toggle("open");
    };

    // Init
    renderConversations();
    loadConversation(currentConvId);
  </script>
</body>
</html>
