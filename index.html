<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RokyGPT</title>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.min.js"></script>

  <style>
    :root {
      --bg: #0f0f11;
      --sidebar: #202123;
      --chat-bg: #0f0f11;
      --msg-user: #1a7bff;       /* bleu ChatGPT user */
      --msg-bot: #2d2d2f;        /* gris très foncé bot */
      --text: #ececf1;
      --text-muted: #acacbe;
      --border: #343541;
      --accent: #10a37f;         /* vert subtil pour boutons */
      --input-bg: #40414f;
      --input-border: #565869;
      --shadow: 0 4px 30px rgba(0,0,0,0.5);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* SIDEBAR – exactement comme ChatGPT */
    #sidebar {
      width: 260px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    #sidebar-header {
      padding: 12px 16px;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }

    #new-chat {
      margin: 16px 16px 8px;
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }
    #new-chat:hover { background: #0e8c6d; }

    #conversations {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .conv-item {
      padding: 12px 20px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.94rem;
      transition: all 0.15s;
      border-radius: 6px;
      margin: 0 8px;
    }
    .conv-item:hover,
    .conv-item.active {
      background: rgba(255,255,255,0.08);
      color: white;
    }
    .conv-item .delete-btn {
      opacity: 0;
      color: #ef4444;
      font-size: 1rem;
      margin-left: auto;
    }
    .conv-item:hover .delete-btn { opacity: 0.8; }

    /* MAIN CHAT */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--chat-bg);
    }

    #chat-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 500;
      font-size: 1.05rem;
      background: rgba(15,15,17,0.85);
      backdrop-filter: blur(12px);
      position: relative;
      z-index: 10;
    }

    #menu-toggle {
      display: none;
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-muted);
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      max-width: 940px;
      margin: 0 auto;
      width: 100%;
    }

    .msg {
      max-width: 75%;
      padding: 14px 20px;
      border-radius: 20px;
      line-height: 1.6;
      font-size: 15.5px;
      white-space: pre-wrap;
      word-break: break-word;
      animation: fadeIn 0.4s ease;
    }

    .user {
      align-self: flex-end;
      background: var(--msg-user);
      color: white;
    }

    .bot {
      align-self: flex-start;
      background: var(--msg-bot);
      border: 1px solid var(--border);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    pre {
      background: #1e1e1e;
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
      margin: 12px 0;
    }

    .mermaid {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
    }

    /* INPUT – très proche ChatGPT */
    #input-area {
      padding: 16px 24px 24px;
      background: var(--chat-bg);
      border-top: 1px solid var(--border);
    }

    #input-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 16px;
      padding: 12px 18px;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 16px;
      resize: none;
      min-height: 24px;
      max-height: 160px;
      line-height: 1.5;
      outline: none;
    }

    #files { display: none; }
    #attach-btn {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.4rem;
      padding: 8px;
    }

    #send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    #send-btn:hover { background: #0e8c6d; }

    .thinking {
      align-self: flex-start;
      color: var(--text-muted);
      font-style: italic;
      padding: 14px 20px;
      animation: pulse 1.6s infinite;
    }
    .thinking span {
      animation: dots 1.4s steps(5, end) infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
    @keyframes dots { 0%,20% { content: "."; } 40% { content: ".."; } 60% { content: "..."; } }

    /* Mobile */
    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        inset: 0 0 0 -100%;
        width: 80%;
        z-index: 200;
        transition: transform 0.3s ease;
      }
      #sidebar.open { transform: translateX(100%); }
      #chat-header { padding-left: 60px; }
      #menu-toggle { display: block; }
      #chat { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <aside id="sidebar">
    <div id="sidebar-header">RokyGPT</div>
    <button id="new-chat">+ Nouveau chat</button>
    <div id="conversations"></div>
  </aside>

  <main id="main">
    <div id="chat-header">
      <div id="menu-toggle">☰</div>
      <span id="current-title">RokyGPT</span>
    </div>

    <div id="chat"></div>

    <div id="input-area">
      <div id="input-wrapper">
        <label for="files" id="attach-btn">📎</label>
        <input type="file" id="files" multiple />
        <textarea id="input" rows="1" placeholder="Envoyer un message à RokyGPT..."></textarea>
        <button id="send-btn">➜</button>
      </div>
    </div>
  </main>

  <script>
    // Ton script JavaScript reste quasi identique – juste quelques ajustements mineurs pour compatibilité
    // (le reste est inchangé par rapport à ta dernière version corrigée)

    mermaid.initialize({ startOnLoad: true, theme: 'dark' });

    let currentConvId = localStorage.getItem('currentConvId') || Date.now().toString();
    let conversations = JSON.parse(localStorage.getItem('rokyConversations') || '{}');
    let hasSyncedThisConv = false;

    if (!conversations[currentConvId]) {
      conversations[currentConvId] = { id: currentConvId, title: "Nouvelle conversation", messages: [] };
    }

    function saveConversations() {
      localStorage.setItem('rokyConversations', JSON.stringify(conversations));
      localStorage.setItem('currentConvId', currentConvId);
    }

    function renderConversations() {
      const container = document.getElementById("conversations");
      container.innerHTML = "";
      Object.values(conversations).forEach(conv => {
        const item = document.createElement("div");
        item.className = `conv-item ${conv.id === currentConvId ? 'active' : ''}`;
        item.innerHTML = `
          <span>${conv.title}</span>
          <span class="delete-btn" onclick="deleteConv('${conv.id}'); event.stopPropagation();">✕</span>
        `;
        item.onclick = () => loadConversation(conv.id);
        container.appendChild(item);
      });
    }

    function loadConversation(id) {
      currentConvId = id;
      hasSyncedThisConv = false;
      saveConversations();
      renderConversations();

      const conv = conversations[id];
      document.getElementById("current-title").textContent = conv.title || "RokyGPT";

      const chat = document.getElementById("chat");
      chat.innerHTML = "";

      conv.messages.forEach(msg => {
        renderMessageToUI(msg.content, msg.role === "user" ? "user" : "bot", msg.files || []);
      });

      if (conv.messages.length === 0) {
        renderMessageToUI("Salut ! Je suis RokyGPT, comment puis-je t’aider ?", "bot");
      }
    }

    async function syncOnceIfNeeded() {
      if (hasSyncedThisConv || !conversations[currentConvId]?.messages?.length) return;

      try {
        const res = await fetch("/restore", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            userId: currentConvId,
            messages: conversations[currentConvId].messages.map(m => ({ role: m.role, content: m.content }))
          })
        });
        if (res.ok) hasSyncedThisConv = true;
      } catch (err) {
        console.error("Erreur sync :", err);
      }
    }

    function createNewConversation() {
      const id = Date.now().toString();
      conversations[id] = { id, title: "Nouvelle conversation", messages: [] };
      currentConvId = id;
      hasSyncedThisConv = false;
      saveConversations();
      renderConversations();
      loadConversation(id);
    }

    function deleteConv(id) {
      if (Object.keys(conversations).length <= 1) {
        alert("Impossible de supprimer la dernière conversation.");
        return;
      }
      if (confirm("Supprimer cette conversation ?")) {
        delete conversations[id];
        if (currentConvId === id) {
          const ids = Object.keys(conversations);
          currentConvId = ids[ids.length - 1];
        }
        saveConversations();
        renderConversations();
        loadConversation(currentConvId);
      }
    }

    function updateTitleIfNeeded(text) {
      const conv = conversations[currentConvId];
      if (conv.title === "Nouvelle conversation" && text.trim()) {
        const firstWords = text.trim().split(/\s+/).slice(0, 6).join(" ").replace(/[^\w\s]/gi, '');
        conv.title = firstWords || "Conversation";
        saveConversations();
        renderConversations();
        document.getElementById("current-title").textContent = conv.title;
      }
    }

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const filesInput = document.getElementById("files");

    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 180) + "px";
    });

    async function send() {
      const msg = input.value.trim();
      if (!msg && filesInput.files.length === 0) return;

      await syncOnceIfNeeded();

      const files = Array.from(filesInput.files);
      addMessage(msg, "user", files);
      updateTitleIfNeeded(msg);

      const thinking = document.createElement("div");
      thinking.className = "thinking";
      thinking.innerHTML = "RokyGPT réfléchit<span>.</span><span>.</span><span>.</span>";
      chat.appendChild(thinking);
      chat.scrollTop = chat.scrollHeight;

      const formData = new FormData();
      formData.append("message", msg);
      formData.append("userId", currentConvId);
      files.forEach(f => formData.append("files", f));

      input.value = "";
      input.style.height = "24px";
      filesInput.value = "";

      try {
        const res = await fetch("/chat", { method: "POST", body: formData });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();

        chat.removeChild(thinking);
        addMessage(data.reply || "Pas de réponse...", "bot");
      } catch (err) {
        console.error(err);
        if (thinking.parentNode) chat.removeChild(thinking);
        addMessage("Erreur – réessaie dans quelques secondes", "bot");
      }
    }

    function renderMessageToUI(text, type, files = []) {
      const div = document.createElement("div");
      div.className = `msg ${type}`;

      let rendered = text;
      try {
        if (text.includes("```mermaid")) {
          const code = text.split("```mermaid")[1]?.split("```")[0] || "";
          rendered = `<div class="mermaid">${code.trim()}</div>`;
          setTimeout(() => mermaid.init(), 150);
        } else {
          rendered = marked.parse(text);
        }
      } catch (e) {
        rendered = text;
      }

      div.innerHTML = rendered;

      div.querySelectorAll("pre code").forEach(el => {
        try { Prism.highlightElement(el); } catch {}
      });

      if (files.length > 0 && type === "user") {
        const fileDiv = document.createElement("div");
        fileDiv.style.marginTop = "10px";
        fileDiv.style.fontSize = "0.9rem";
        fileDiv.style.color = "var(--text-muted)";
        fileDiv.innerHTML = files.map(f => `📎 ${f.name}`).join(" • ");
        div.appendChild(fileDiv);
      }

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addMessage(text, type, files = []) {
      renderMessageToUI(text, type, files);
      conversations[currentConvId].messages.push({
        role: type === "user" ? "user" : "assistant",
        content: text,
        files: files.map(f => ({ name: f.name }))
      });
      saveConversations();
    }

    // Events
    document.getElementById("send-btn").onclick = send;
    input.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    document.getElementById("new-chat").onclick = createNewConversation;

    document.getElementById("menu-toggle").onclick = () => {
      document.getElementById("sidebar").classList.toggle("open");
    };

    // Init
    renderConversations();
    loadConversation(currentConvId);
  </script>
</body>
</html>
